<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AXKLT Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="box">

    <!-- LOGIN -->
    <div id="loginBox">
        <h2>AXKLT LOGIN 🔥</h2>

        <input id="user" placeholder="Tài khoản">
        <input id="pass" type="password" placeholder="Mật khẩu">

        <button onclick="login()">Đăng nhập</button>

        <p onclick="showRegister()">Chưa có tài khoản? Tạo ngay</p>
    </div>

    <!-- REGISTER -->
    <div id="registerBox" style="display:none;">
        <h2>Tạo tài khoản 😎</h2>

        <input id="regUser" placeholder="Tài khoản mới">
        <input id="regPass" type="password" placeholder="Mật khẩu mới">

        <button onclick="register()">Tạo tài khoản</button>

        <p onclick="showLogin()">Quay lại đăng nhập</p>
    </div>

</div>

<script src="main.js"></script>
</body>
</html>
